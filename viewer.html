<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Просмотр документа</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background: #525659; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .loading, .error {
            color: white;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.7);
            padding: 12px 24px;
            border-radius: 8px;
        }
        .error a { color: #ffaa00; }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
    </style>
</head>
<body>
    <div class="container" id="loadingMessage">
        <div class="loading">⏳ Загрузка документа... Пожалуйста, подождите.</div>
    </div>

    <script>
        // --- НАСТРОЙКА ---
        // !!! ВАЖНО: Укажите здесь название вашего PDF-файла !!!
        const pdfFilename = "test.pdf";
        // -----------------

        // Функция для получения RAW-ссылки на файл в текущем репозитории
        function getRawUrl() {
            const currentUrl = window.location.href;
            const urlParts = currentUrl.split('/');
            const isRaw = currentUrl.includes('raw.githubusercontent.com');

            if (isRaw) {
                return currentUrl;
            }

            const repoPartIndex = urlParts.indexOf('github.com') + 1;
            if (repoPartIndex > 0 && urlParts[repoPartIndex]) {
                const username = urlParts[repoPartIndex];
                const repoName = urlParts[repoPartIndex + 1];
                const branch = 'main';
                return `https://raw.githubusercontent.com/${username}/${repoName}/${branch}/${pdfFilename}`;
            } else {
                console.error("Не удалось определить ссылку на RAW-файл");
                return null;
            }
        }

        const pdfUrl = getRawUrl();
        const container = document.getElementById('loadingMessage');

        if (pdfUrl) {
            // Создаем iframe для встраивания PDF
            const iframe = document.createElement('iframe');
            iframe.title = "PDF Viewer";
            iframe.src = pdfUrl;

            // Когда iframe загрузится, показываем его, убирая сообщение
            iframe.onload = () => {
                if (container && container.parentNode) {
                    container.style.display = 'none';
                }
                document.body.appendChild(iframe);
            };
            iframe.onerror = () => {
                if (container) {
                    container.innerHTML = `<div class="error">⚠️ Не удалось загрузить документ.<br><a href="${pdfUrl}" target="_blank">💾 Нажмите здесь, чтобы скачать файл напрямую</a></div>`;
                }
            };
        } else {
            if (container) {
                container.innerHTML = `<div class="error">❌ Ошибка: не удалось определить ссылку на файл.</div>`;
            }
        }
    </script>
</body>
</html>
